<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Savage Wheels - 2D car crashing game armageddon</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas#canvas {
        border: 0 none;
        outline: none;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    <script type="text/javascript">
      var canvasElement = document.getElementById('canvas');

      // Keyboard input dies when this page is embedded in a cross-origin
      // iframe (e.g. itch.io) and the host page's own fullscreen button
      // requests fullscreen on the iframe: no keydown/keyup ever reaches SDL.
      // Re-grab focus on the canvas whenever we get a user gesture inside
      // it and maybe on resize/focus (not guaranteed).
      function focusCanvas() {
        try { canvasElement.focus(); } catch (e) {}
      }
      ['pointerdown', 'mousedown', 'touchstart'].forEach((e) =>
        canvasElement.addEventListener(e, focusCanvas));
      window.addEventListener('resize', focusCanvas);
      window.addEventListener('focus', focusCanvas);
      focusCanvas();

      // Scale the canvas up to fill the available space (fullscreen or
      // windowed) while keeping the game's fixed 4:3 aspect ratio. This
      // sets the canvas's actual CSS box size (not object-fit), so
      // getBoundingClientRect() -- which Emscripten's SDL mouse handler
      // uses to map click coordinates back to the 640x480 backbuffer --
      // matches the visible image 1:1.
      var GAME_ASPECT = 640 / 480;
      function resizeCanvasBox() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        if (w / h > GAME_ASPECT) {
          canvasElement.style.height = h + 'px';
          canvasElement.style.width = Math.round(h * GAME_ASPECT) + 'px';
        } else {
          canvasElement.style.width = w + 'px';
          canvasElement.style.height = Math.round(w / GAME_ASPECT) + 'px';
        }
      }
      window.addEventListener('resize', resizeCanvasBox);
      document.addEventListener('fullscreenchange', resizeCanvasBox);
      resizeCanvasBox();

      // SDL_SetVideoMode (called from within main(), after this script has
      // already run once) sets canvas.width/height and resets the canvas's
      // style, wiping the sizing above. Reapply once that happens instead
      // of relying on the user triggering a window resize afterwards.
      new MutationObserver(resizeCanvasBox).observe(canvasElement, {
        attributes: true,
        attributeFilter: ['width', 'height']
      });

#if MODULARIZE && !EXPORT_ES6
      var moduleArgs = {
#else
      var Module = {
#endif
        print(...args) { console.log(...args); },
        printErr(...args) { console.error(...args); },
        canvas: canvasElement,
        setStatus() {},
        monitorRunDependencies() {}
      };
      window.onerror = window.onunhandledrejection = (e) => {
        console.error('[uncaught]', e);
      };
    </script>
    {{{ SCRIPT }}}
#if MODULARIZE && !EXPORT_ES6
    <script type="text/javascript">
      {{{ EXPORT_NAME }}}(moduleArgs);
    </script>
#endif
  </body>
</html>
